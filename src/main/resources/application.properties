# Nome da nossa aplicaçăo
spring.application.name=medconnect

# Configuraçőes de conexăo do Banco de Dados H2 (Em Memória)
spring.datasource.url=jdbc:h2:mem:medconnectdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar o console do H2 no navegador (MUITO ÚTIL PARA TESTES)
# Vocę poderá acessar o banco digitando no navegador: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Instruçăo Mágica do Hibernate
# "update" diz ao Hibernate para ler nossas classes @Entity e criar/atualizar as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostrar no console da IDE os comandos SQL que o Hibernate está rodando por baixo dos panos
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
